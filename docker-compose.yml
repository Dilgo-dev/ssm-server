services:
  ssm-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=change-me-to-a-random-string
      - DATA_DIR=/data
      # Optional SMTP (uncomment to enable email verification):
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USER=you@example.com
      # - SMTP_PASS=your-password
      # - API_URL=https://ssm.yourdomain.com
    volumes:
      - ssm-data:/data
    restart: unless-stopped

volumes:
  ssm-data:
